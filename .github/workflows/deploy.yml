name: FitQuest Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USERNAME }}
      EC2_PORT: ${{ secrets.EC2_PORT }}

    steps:
      - name: Create SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem

      - name: Add EC2 to known_hosts
        run: |
          ssh-keyscan -p "$EC2_PORT" -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no \
              -i ~/.ssh/ec2_key.pem \
              -p "$EC2_PORT" \
              "$EC2_USER@$EC2_HOST" \
              'chmod +x /home/ubuntu/capstone25-fit-quest/Infra/deploy.sh && /home/ubuntu/capstone25-fit-quest/Infra/deploy.sh'
