name: Deploy Backend

on:
  push:
    branches:
      - backend-final
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. backend-final 브랜치 코드 체크아웃
      - name: Checkout backend-final
        uses: actions/checkout@v4
        with:
          ref: backend-final

      # 2. EC2에 "백엔드만" 복사
      - name: Copy backend to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "fitquest-backend-main"
          target: "/home/ubuntu/fitquest/capstone25-fit-quest"

      # 3. EC2에서 배포 실행
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/fitquest/capstone25-fit-quest/fitquest-backend-main
            chmod +x deploy.sh
            ./deploy.sh
