services:
  nginx:
    image: nginx:latest
    container_name: fitquest-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - fitquest-net

networks:
  fitquest-net:
    external: true
