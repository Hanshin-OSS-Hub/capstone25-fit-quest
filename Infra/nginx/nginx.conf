events {}

http {
    server {
        listen 80;
        server_name fitquest25.xyz www.fitquest25.xyz;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name fitquest25.xyz www.fitquest25.xyz;

        ssl_certificate /etc/letsencrypt/live/fitquest25.xyz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/fitquest25.xyz/privkey.pem;

        location / {
            proxy_pass http://fitquest-backend-web:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
