services:
  db:
    image: mysql:8.0
    container_name: db
    restart: always
    environment:
      MYSQL_DATABASE: fitquest_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password123
      MYSQL_ROOT_PASSWORD: rootpassword
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - fitquest-net

  web:
    container_name: fitquest-backend-web
    restart: always
    depends_on:
      db:
        condition: service_healthy
    build: ../backend
    command: >
      sh -c "
      until mysqladmin ping -h db -uroot -prootpassword --skip-ssl --silent; do
        echo 'waiting for db...';
        sleep 2;
      done;
      python manage.py migrate &&
      gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 1
      "
    ports:
      - "8000:8000"
    environment:
      - TZ=Asia/Seoul
      - PYTHONUNBUFFERED=1
    networks:
      - fitquest-net

  nginx:
    image: nginx:latest
    container_name: fitquest-nginx
    restart: always
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - fitquest-net

networks:
  fitquest-net:
    driver: bridge
